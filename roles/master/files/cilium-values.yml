# cilium-values.yaml
ipam:
  mode: "cluster-pool"
  operator:
    clusterPoolIPv4PodCIDRList: ["10.244.0.0/16"]
    clusterPoolIPv4MaskSize: 24

# Encapsulation is best for Proxmox bridges
routingMode: "tunnel"
tunnelProtocol: "vxlan"

# Required for Ubuntu 24.04 (Noble) kernel compatibility
bpf:
  masquerade: true
  tproxy: true

# Enable Hubble for network visibility (highly recommended for labs)
hubble:
  enabled: true
  relay:
    enabled: true
  ui:
    enabled: true

bgpControlPlane:
  enabled: true

l2announcements:
  enabled: true
externalIPs:
  enabled: true
devices: "ens18"

# If you want to replace kube-proxy entirely (cleaner, but more advanced)
# kubeProxyReplacement: true
# k8sServiceHost: "192.168.1.50" # Your Master Node IP
# k8sServicePort: "6443"