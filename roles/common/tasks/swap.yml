---
# code: language=ansible
- name: Check swap
  ansible.builtin.command:
    cmd: swapon --show
  register: common_swap_show
  changed_when: false

- name: Disable swap # noqa no-changed-when
  ansible.builtin.command:
    cmd: swapoff -a
  when: common_swap_show.stdout != ""

- name: Comment out swap in fstab
  ansible.builtin.lineinfile:
    path: /etc/fstab
    regexp: "^(/swap.img.*)"
    line: S"#\\1"
    backrefs: true
